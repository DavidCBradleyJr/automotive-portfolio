<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | David Bradley Photography</title>

    <!-- Google Fonts: Orbitron (display) + Space Grotesk (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="admin-app">
      <!-- Login screen (shown when not authenticated) -->
      <div id="login-screen" class="admin-login">
        <h1 class="admin-login__title">David Bradley</h1>
        <p class="admin-login__subtitle">Admin Panel</p>
        <button id="login-btn" class="btn btn--primary admin-login__btn">Log In</button>
      </div>

      <!-- Admin panel (hidden until authenticated) -->
      <div id="admin-panel" class="admin-panel" hidden>
        <header class="admin-header">
          <h1 class="admin-header__title">Admin Panel</h1>
          <button id="logout-btn" class="btn btn--secondary admin-header__logout">Log Out</button>
        </header>

        <nav class="admin-tabs">
          <button class="admin-tab admin-tab--active" data-tab="upload">Upload</button>
          <button class="admin-tab" data-tab="gallery">Gallery</button>
          <button class="admin-tab" data-tab="settings">Settings</button>
        </nav>

        <main class="admin-content">
          <section id="panel-upload" class="admin-panel-section admin-panel-section--active">
            <h2>Upload Photos</h2>

            <!-- Batch category selector -->
            <div class="upload-batch-settings">
              <label class="upload-label" for="batch-category">Category for this batch</label>
              <select id="batch-category" class="upload-select">
                <option value="">Select category...</option>
                <option value="jdm">JDM</option>
                <option value="euro">Euro</option>
                <option value="supercar">Supercar</option>
                <option value="american-muscle">American Muscle</option>
                <option value="track">Track/Motorsport</option>
              </select>
            </div>

            <!-- Drop zone -->
            <div class="upload-zone" id="upload-zone">
              <div class="upload-zone__icon">+</div>
              <p class="upload-zone__text">Drag photos here or</p>
              <label class="btn btn--primary upload-zone__btn">
                Browse Files
                <input type="file" id="file-input" multiple accept="image/jpeg,image/png,image/webp" hidden>
              </label>
              <p class="upload-zone__hint">JPEG, PNG, or WebP -- max 4 MB per file</p>
            </div>

            <!-- File queue (populated by JS) -->
            <div id="upload-queue" class="upload-queue"></div>

            <!-- Upload button -->
            <button id="upload-btn" class="btn btn--primary upload-action-btn" disabled>
              Upload All
            </button>
          </section>
          <section id="panel-gallery" class="admin-panel-section">
            <h2>Gallery</h2>
            <p class="admin-placeholder">Gallery view loading...</p>
          </section>
          <section id="panel-settings" class="admin-panel-section">
            <h2>Settings</h2>
            <p class="admin-placeholder">Settings loading...</p>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/src/admin/admin.js"></script>
  </body>
</html>
