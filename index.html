<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>David Bradley | Automotive Photography</title>

    <!-- Open Graph -->
    <meta property="og:title" content="David Bradley | Automotive Photography" />
    <meta property="og:description" content="Where Speed Meets Art — premium automotive photography portfolio" />
    <meta property="og:type" content="website" />

    <!-- Google Fonts: Orbitron (display) + Space Grotesk (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ================================================================
         Navigation
         ================================================================ -->
    <header class="nav" id="nav">
      <div class="nav__container">
        <a href="#hero" class="nav__logo">
          <span class="nav__monogram">DB</span>
          <span class="nav__wordmark">David Bradley</span>
        </a>

        <ul class="nav__links">
          <li><a href="#gallery" class="nav__link">Gallery</a></li>
          <li><a href="#video" class="nav__link">Video</a></li>
          <li><a href="#about" class="nav__link">About</a></li>
          <li><a href="#bts" class="nav__link">BTS</a></li>
          <li><a href="#contact" class="nav__link">Contact</a></li>
        </ul>

        <a href="#contact" class="nav__cta btn btn--primary">Book a Shoot</a>

        <button
          class="nav__hamburger"
          aria-label="Menu"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <!-- Mobile overlay -->
      <div class="nav__overlay">
        <ul>
          <li><a href="#gallery" class="nav__overlay-link">Gallery</a></li>
          <li><a href="#video" class="nav__overlay-link">Video</a></li>
          <li><a href="#about" class="nav__overlay-link">About</a></li>
          <li><a href="#bts" class="nav__overlay-link">BTS</a></li>
          <li><a href="#contact" class="nav__overlay-link">Contact</a></li>
        </ul>
        <a href="#contact" class="nav__overlay-cta btn btn--primary">Book a Shoot</a>
      </div>
    </header>

    <!-- ================================================================
         Hero
         ================================================================ -->
    <section class="hero" id="hero">
      <img
        class="hero__image"
        src="/images/hero-placeholder.webp"
        alt="High-performance sports car photographed at golden hour"
        fetchpriority="high"
        width="1920"
        height="1080"
      />
      <div class="hero__overlay"></div>
      <div class="hero__content">
        <h1 class="hero__name">David Bradley</h1>
        <p class="hero__tagline">Where Speed Meets Art</p>
        <a href="#gallery" class="hero__cta btn btn--primary">View Gallery</a>
      </div>
    </section>

    <!-- ================================================================
         Section Stubs
         ================================================================ -->
    <section class="section gallery" id="gallery">
      <h2 class="section__heading">Gallery</h2>

      <!-- Filter bar - sticks below nav on scroll -->
      <div class="gallery__filters" id="gallery-filters">
        <!-- Filter pills rendered by JS from categories data -->
      </div>

      <!-- Masonry grid - items rendered by JS from galleryImages data -->
      <div class="gallery__grid" id="gallery-grid">
        <!-- Gallery items injected by gallery.js -->
      </div>

      <!-- CTA after gallery -->
      <div class="gallery__cta-wrap">
        <a href="#contact" class="btn btn--primary gallery__cta">Book a Shoot</a>
      </div>
    </section>

    <section class="section" id="video">
      <h2 class="section__heading">Video</h2>
    </section>

    <section class="section" id="about">
      <h2 class="section__heading">About</h2>
    </section>

    <section class="section" id="bts">
      <h2 class="section__heading">Behind the Scenes</h2>
    </section>

    <section class="section" id="contact">
      <h2 class="section__heading">Contact</h2>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
